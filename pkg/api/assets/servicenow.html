<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fides · ServiceNow Integration</title>
<style>
  :root { --bg:#0a0a0a; --panel:#121212; --border:#262626; --fg:#e5e5e5; --muted:#9ca3af;
          --green:#34d399; --purple:#a855f7; --red:#f87171; --amber:#fbbf24; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.5 ui-sans-serif,system-ui,sans-serif; }
  header { padding:18px 28px; border-bottom:1px solid var(--border); }
  h1 { margin:0; font:600 18px ui-monospace,monospace; letter-spacing:.04em; }
  header p { margin:4px 0 0; color:var(--muted); font-size:13px; }
  main { max-width:980px; margin:0 auto; padding:24px 28px; display:grid; gap:20px; }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:20px; }
  .panel h2 { margin:0 0 14px; font:600 12px ui-monospace,monospace; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
  label { display:block; font-size:12px; color:var(--muted); margin:10px 0 4px; }
  input, select { width:100%; background:#1a1a1a; border:1px solid var(--border); color:var(--fg);
                  border-radius:7px; padding:9px 11px; font:13px ui-monospace,monospace; }
  .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .check { display:flex; align-items:center; gap:8px; margin-top:14px; }
  .check input { width:auto; }
  button { background:var(--purple); color:#fff; border:0; border-radius:7px; padding:9px 16px;
           font:600 13px ui-sans-serif,system-ui; cursor:pointer; margin-top:14px; }
  button.ghost { background:transparent; border:1px solid var(--border); color:var(--fg); }
  button:active { transform:translateY(1px); }
  .btnrow { display:flex; gap:10px; flex-wrap:wrap; }
  pre { background:#1a1a1a; border:1px solid var(--border); border-radius:7px; padding:12px;
        overflow:auto; font:12px ui-monospace,monospace; color:var(--green); max-height:280px; white-space:pre-wrap; word-break:break-word; }
  table { width:100%; border-collapse:collapse; font:12px ui-monospace,monospace; }
  th,td { text-align:left; padding:7px 9px; border-bottom:1px solid var(--border); }
  th { color:var(--muted); font-weight:600; }
  .pill { padding:2px 8px; border-radius:999px; font-size:11px; }
  .delivered { background:rgba(52,211,153,.15); color:var(--green); }
  .pending { background:rgba(251,191,36,.15); color:var(--amber); }
  .dead { background:rgba(248,113,113,.15); color:var(--red); }
  .msg { font-size:12px; margin-top:10px; min-height:16px; }
  .ok { color:var(--green); } .err { color:var(--red); }
  .muted { color:var(--muted); }
</style>
</head>
<body>
<header>
  <h1>ServiceNow Integration</h1>
  <p>View, verify and monitor the ServiceNow connection (CMDB · ITOM · ITSM). Sign in to the portal first — this page uses your session.</p>
</header>
<main>
  <section class="panel">
    <h2>Connection</h2>
    <div class="row">
      <div><label>Instance URL</label><input id="instance_url" placeholder="https://acme.service-now.com" /></div>
      <div><label>Auth type</label><select id="auth_type"><option value="basic">basic</option><option value="oauth2">oauth2</option></select></div>
    </div>
    <div class="row">
      <div><label>Client ID / Username</label><input id="client_id" placeholder="svc-account or oauth client id" /></div>
      <div><label>Secret reference (secret_path)</label><input id="secret_path" placeholder="fides/servicenow (env var or Secrets Manager id)" /></div>
    </div>
    <div class="check"><input type="checkbox" id="enabled" checked /><label style="margin:0">Enabled</label></div>
    <div class="btnrow">
      <button class="ghost" onclick="loadConfig()">Reload</button>
      <button onclick="saveConfig()">Save configuration</button>
    </div>
    <div id="cfgMsg" class="msg"></div>
  </section>

  <section class="panel">
    <h2>Verify</h2>
    <div class="row">
      <div>
        <label>Change request status — change number</label>
        <input id="chgNum" placeholder="CHG0030192" />
        <button onclick="checkChange()">Get change status</button>
      </div>
      <div>
        <label>CMDB search — CI name</label>
        <input id="ciName" placeholder="payments" />
        <button onclick="searchCmdb()">Search CMDB</button>
      </div>
    </div>
    <div id="verifyMsg" class="msg"></div>
    <pre id="verifyOut" style="display:none"></pre>
  </section>

  <section class="panel">
    <h2>Monitor — recent integration events</h2>
    <div class="btnrow"><button class="ghost" onclick="loadEvents()">Refresh</button></div>
    <div id="evtMsg" class="msg"></div>
    <table id="evtTable" style="display:none">
      <thead><tr><th>Event</th><th>Status</th><th>Attempts</th><th>Created</th><th>Last error</th></tr></thead>
      <tbody id="evtBody"></tbody>
    </table>
  </section>
</main>
<script>
const $ = id => document.getElementById(id);
async function api(method, path, body) {
  const opt = { method, credentials: 'include', headers: {} };
  if (body) { opt.headers['Content-Type'] = 'application/json'; opt.body = JSON.stringify(body); }
  const r = await fetch(path, opt);
  const text = await r.text();
  if (r.status === 401) throw new Error('Not signed in — open the portal and log in, then reload this page.');
  if (!r.ok) throw new Error(text || ('HTTP ' + r.status));
  try { return JSON.parse(text); } catch { return text; }
}
function setMsg(id, text, ok) { const e = $(id); e.textContent = text; e.className = 'msg ' + (ok ? 'ok' : 'err'); }

async function loadConfig() {
  try {
    const c = await api('GET', '/api/v1/tenant/servicenow');
    $('instance_url').value = c.instance_url || '';
    $('auth_type').value = c.auth_type || 'basic';
    $('client_id').value = c.client_id || '';
    $('secret_path').value = c.secret_path || '';
    $('enabled').checked = c.enabled !== false && (c.instance_url ? true : false);
    setMsg('cfgMsg', c.instance_url ? 'Loaded current configuration.' : 'No configuration yet — fill the form and save.', true);
  } catch (e) { setMsg('cfgMsg', e.message, false); }
}
async function saveConfig() {
  const body = { instance_url: $('instance_url').value.trim(), auth_type: $('auth_type').value,
                 client_id: $('client_id').value.trim(), secret_path: $('secret_path').value.trim(),
                 enabled: $('enabled').checked };
  try { await api('POST', '/api/v1/tenant/servicenow', body); setMsg('cfgMsg', 'Saved.', true); }
  catch (e) { setMsg('cfgMsg', e.message, false); }
}
function showVerify(obj) { const p = $('verifyOut'); p.style.display = 'block'; p.textContent = JSON.stringify(obj, null, 2); }
async function checkChange() {
  const n = $('chgNum').value.trim(); if (!n) return setMsg('verifyMsg', 'Enter a change number.', false);
  try { const r = await api('GET', '/api/v1/servicenow/change-status?change_number=' + encodeURIComponent(n));
        setMsg('verifyMsg', r.found ? 'Change found.' : 'No matching change.', true); showVerify(r); }
  catch (e) { setMsg('verifyMsg', e.message, false); }
}
async function searchCmdb() {
  const n = $('ciName').value.trim(); if (!n) return setMsg('verifyMsg', 'Enter a CI name.', false);
  try { const r = await api('GET', '/api/v1/servicenow/cmdb?name=' + encodeURIComponent(n));
        setMsg('verifyMsg', (r && r.length ? r.length : 0) + ' CI(s) found.', true); showVerify(r); }
  catch (e) { setMsg('verifyMsg', e.message, false); }
}
async function loadEvents() {
  try {
    const evts = await api('GET', '/api/v1/tenant/servicenow/events');
    const body = $('evtBody'); body.innerHTML = '';
    if (!evts || !evts.length) { setMsg('evtMsg', 'No integration events yet.', true); $('evtTable').style.display = 'none'; return; }
    for (const e of evts) {
      const tr = document.createElement('tr');
      const cls = e.status === 'delivered' ? 'delivered' : (e.status === 'dead' ? 'dead' : 'pending');
      tr.innerHTML = `<td>${e.event_type}</td><td><span class="pill ${cls}">${e.status}</span></td>`
        + `<td>${e.attempts}</td><td class="muted">${(e.created_at||'').replace('T',' ').slice(0,19)}</td>`
        + `<td class="err">${e.last_error||''}</td>`;
      body.appendChild(tr);
    }
    $('evtTable').style.display = 'table'; setMsg('evtMsg', evts.length + ' recent event(s).', true);
  } catch (e) { setMsg('evtMsg', e.message, false); }
}
loadConfig(); loadEvents();
</script>
</body>
</html>
