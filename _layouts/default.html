<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }} - {{ site.description }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ 
      startOnLoad: true, 
      theme: 'dark',
      themeVariables: {
        background: '#1d2021',
        primaryColor: '#fe8019',
        primaryTextColor: '#ebdbb2',
        lineColor: '#a89984'
      }
    });
  </script>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1><i class="fa-solid fa-shield-halved"></i> {{ site.title }}</h1>
      <p class="tagline">{{ site.description }}</p>
      <nav class="nav">
        <a href="{{ '/' | relative_url }}"><i class="fa-solid fa-home"></i> Home</a> |
        <a href="{{ '/guide.html' | relative_url }}"><i class="fa-solid fa-book"></i> User Guide</a> |
        <a href="{{ '/servicenow-pitch.html' | relative_url }}"><i class="fa-solid fa-handshake"></i> ServiceNow</a> |
        <a href="https://github.com/olafkfreund/fides" target="_blank"><i class="fa-brands fa-github"></i> Repository</a>
      </nav>
    </header>

    <main class="content">
      {{ content }}
    </main>

    <footer class="footer">
      <p>&copy; 2026 Fides Compliance. Built with Jekyll and Gruvbox Dark Theme.</p>
    </footer>
  </div>
</body>
</html>
