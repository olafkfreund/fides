version: '3.8'

services:
  # 1. Relational Database
  db:
    image: postgres:15-alpine
    container_name: fides-db
    environment:
      POSTGRES_DB: fides
      POSTGRES_USER: fides_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.example)}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fides_user -d fides"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Local Evidence Storage (MinIO)
  minio:
    image: minio/minio:latest
    container_name: fides-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set (see .env.example)}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set (see .env.example)}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Bucket Creator
  mc:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set (see .env.example)}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set (see .env.example)}
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb myminio/fides-evidence;
      exit 0;
      "

  # 4. Local LLM Service (Ollama)
  ollama:
    image: ollama/ollama:latest
    container_name: fides-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # 5. Fides Server (API / Portal)
  fides-server:
    image: fides/server:latest
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: fides-server
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      - PORT=8080
      - ENV=production
      
      # Database
      # NOTE: sslmode=disable is only acceptable on this isolated internal
      # compose network. Use sslmode=verify-full against a TLS-enabled DB in prod.
      - DB_DRIVER=postgres
      - DB_DSN=host=db port=5432 user=fides_user password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set} dbname=fides sslmode=disable

      # Storage (MinIO)
      - STORAGE_DRIVER=s3
      - STORAGE_S3_ENDPOINT=http://minio:9000
      - STORAGE_S3_BUCKET=fides-evidence
      - STORAGE_S3_ACCESS_KEY=${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      - STORAGE_S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
      - STORAGE_S3_USE_SSL=false
      - STORAGE_S3_REGION=us-east-1

      # Secrets Configuration
      - SECRETS_PROVIDER=env

      # Evidence encryption key (32 random bytes, base64-encoded)
      - FIDES_ENCRYPTION_KEY=${FIDES_ENCRYPTION_KEY:?FIDES_ENCRYPTION_KEY must be set}

      # API authentication token (required to call /api/v1 endpoints)
      - FIDES_API_TOKEN=${FIDES_API_TOKEN:?FIDES_API_TOKEN must be set}

      # Tenant the static service token is scoped to (required with FIDES_API_TOKEN)
      - FIDES_API_ORG_ID=${FIDES_API_ORG_ID:?FIDES_API_ORG_ID must be set}

      # AI Verification Gate Configuration
      - AI_PROVIDER=ollama
      - AI_OLLAMA_ENDPOINT=http://ollama:11434
      - AI_MODEL=llama3:8b
    restart: always

volumes:
  postgres_data:
  minio_data:
  ollama_data:
