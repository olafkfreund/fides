# Template for the Secret referenced by kubernetes/fides-deploy.yaml.
# Create the REAL secret out-of-band — do NOT commit real values. e.g.:
#
#   kubectl -n fides create secret generic fides-secrets \
#     --from-literal=postgres-password="$(head -c 24 /dev/urandom | base64)" \
#     --from-literal=db-dsn='host=fides-db port=5432 user=fides_user password=<same db password> dbname=fides sslmode=disable' \
#     --from-literal=encryption-key="$(head -c 32 /dev/urandom | base64)" \
#     --from-literal=api-token="$(head -c 32 /dev/urandom | base64)" \
#     --from-literal=portal-password='<admin portal password>'
#
# Note: the password inside `db-dsn` MUST match `postgres-password`.
# Prefer a SealedSecret / ExternalSecret in production. This file is a reference only.
apiVersion: v1
kind: Secret
metadata:
  name: fides-secrets
  namespace: fides
type: Opaque
stringData:
  postgres-password: CHANGEME
  db-dsn: host=fides-db port=5432 user=fides_user password=CHANGEME dbname=fides sslmode=disable
  encryption-key: CHANGEME-32-random-bytes-base64
  api-token: CHANGEME-random-token
  portal-password: CHANGEME
