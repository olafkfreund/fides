name: Go Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Match the version required by go.mod.
          go-version: '1.26.x'
          check-latest: true

      - name: Verify dependencies
        run: go mod verify

      - name: Vet code
        run: go vet ./...

      - name: Build
        run: go build ./...

      # Guard against shipping a corrupted frontend build: every committed
      # Next.js chunk must parse as valid JavaScript. A broken chunk crashes the
      # whole portal (blank page) even though the server stays healthy.
      - name: Validate web build (JS chunks parse)
        run: |
          shopt -s nullglob
          fail=0
          for f in web/_next/static/chunks/*.js web/_next/static/chunks/**/*.js; do
            node --check "$f" || { echo "BROKEN CHUNK: $f"; fail=1; }
          done
          exit $fail

      - name: Run Tests
        run: go test -race -v ./...

      - name: Vulnerability scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      # gosec is advisory: it reports findings but does not block the pipeline
      # (the current findings are mostly low-severity / accepted false-positives,
      # e.g. guarded storage paths, the allowlisted MCP exec, and the configured
      # MCP server URL). Findings are triaged separately; see the gosec issue.
      - name: Static security analysis (gosec)
        continue-on-error: true
        uses: securego/gosec@master
        with:
          args: -severity medium -confidence high ./...

  rls-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: fides
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fides"
          --health-interval 5s --health-timeout 5s --health-retries 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          check-latest: true

      # Proves the Postgres RLS policies (schema-rls.sql) enforce tenant
      # isolation: pkg/db verifies ScopedConn directly, and pkg/api runs an
      # end-to-end HTTP test with RLS enabled. -p 1 serializes the two packages
      # since they share the database.
      - name: RLS + events integration + E2E tests
        env:
          FIDES_TEST_DB_DSN: host=127.0.0.1 port=5432 user=postgres password=test dbname=fides sslmode=disable
        run: go test -p 1 ./pkg/db/ ./pkg/api/ ./pkg/events/ -run 'Integration|EndToEnd' -v

  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-test, rls-integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write   # required for GitHub OIDC -> AWS role assumption
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Assume the deploy IAM role via GitHub OIDC — no stored AWS keys.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: 796973489124.dkr.ecr.eu-west-2.amazonaws.com
          ECR_REPOSITORY: fides-server
        run: |
          # Tag by commit SHA (immutable, reproducible) and also move :latest.
          docker build -f Dockerfile.server \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name sarc-aws --region eu-west-2

      - name: Deploy to Kubernetes
        env:
          ECR_REGISTRY: 796973489124.dkr.ecr.eu-west-2.amazonaws.com
          ECR_REPOSITORY: fides-server
        run: |
          kubectl apply -f kubernetes/fides-deploy.yaml
          # Pin the Deployment to the exact image built here and wait for the
          # rollout, so a new build always rolls out (a plain apply of an
          # unchanged :latest manifest would not restart the pods).
          kubectl -n fides set image deployment/fides-server \
            app=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          kubectl -n fides rollout status deployment/fides-server --timeout=240s
