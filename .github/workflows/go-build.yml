name: Go Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Match the version required by go.mod.
          go-version: '1.26.x'
          check-latest: true

      - name: Verify dependencies
        run: go mod verify

      - name: Vet code
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Run Tests
        run: go test -race -v ./...

      - name: Vulnerability scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Static security analysis (gosec)
        uses: securego/gosec@master
        with:
          args: ./...

  rls-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: fides
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fides"
          --health-interval 5s --health-timeout 5s --health-retries 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          check-latest: true

      # Proves the Postgres RLS policies (schema-rls.sql) enforce tenant
      # isolation: pkg/db verifies ScopedConn directly, and pkg/api runs an
      # end-to-end HTTP test with RLS enabled. -p 1 serializes the two packages
      # since they share the database.
      - name: RLS integration + E2E tests
        env:
          FIDES_TEST_DB_DSN: host=127.0.0.1 port=5432 user=postgres password=test dbname=fides sslmode=disable
        run: go test -p 1 ./pkg/db/ ./pkg/api/ -run 'Integration|EndToEnd' -v
